# ⚠️ SET THIS to your real domain before deploying (Vercel custom domain or *.vercel.app URL).
# Every absolute URL, the sitemap, RSS, and OpenGraph tags derive from it.
baseURL: "https://gramajo.blog/"
title: "Juan Gramajo"
copyright: "Juan Gramajo"

languageCode: en-us

pagination:
  pagerSize: 8

enableRobotsTXT: true
enableEmoji: true
buildDrafts: false
buildFuture: false
buildExpired: false

# Needed for the search page (Fuse.js reads /index.json)
outputs:
  home:
    - HTML
    - RSS
    - JSON

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "Juan Gramajo"
  description: "Notes on building in web3, raising a kid, learning in public, and whatever else is on my mind. From 0773H and the daily grind."
  keywords: [web3, crypto, farcaster, writing, parenthood, building in public]
  author: "Juan Gramajo"
  # og image used when a post has no cover of its own
  images: ["/og-image.png"]
  DateFormat: "Jan 2, 2006"
  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: false        # the 7-icon share row reads busy/dated — off for a cleaner footer
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true      # was false
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  ShowToc: true                  # nice on the longer essays
  TocOpen: false
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false

  # Homepage intro. This is the first thing a reader sees — make it sell.
  homeInfoParams:
    Title: "Hey, I'm Juan 👋"
    Content: >
      I write about building a small web3 media thing (**0773H**), figuring out
      fatherhood, and learning in public — plus the occasional game, book, or
      trip that stuck with me. Some of these posts go back to 2016, when I was
      teaching myself to code. Poke around.

  socialIcons:
    - name: github
      title: "Code on GitHub"
      url: "https://github.com/jgramajo4"
    - name: substack
      title: "0773H on Substack"
      url: "https://gramajo.substack.com/"
    - name: rss
      title: "Subscribe via RSS"
      url: "/index.xml"
    # - name: x            # ← add your handle and uncomment
    #   url: "https://x.com/YOURHANDLE"

  # Palette + typography redesigned in assets/css/extended/custom.css;
  # both themes get an intentional look instead of PaperMod's default gray.

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false
    responsiveImages: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 10
    - identifier: archive
      name: Archive
      url: /archives/
      weight: 20
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 30
    - identifier: search
      name: Search
      url: /search/
      weight: 40

pygmentsUseClasses: true

markup:
  highlight:
    noClasses: false          # use CSS classes so our theme controls code colors
    style: monokai
    lineNos: false
    codeFences: true
    guessSyntax: true
    tabWidth: 2
  goldmark:
    renderer:
      unsafe: true            # allow inline HTML in markdown when you need it

module:
  imports:
    - path: github.com/adityatelange/hugo-PaperMod
